name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail

            APP_NAME="${{ secrets.APP_NAME || 'exchangehub' }}"
            APP_DIR="${{ secrets.APP_DIR || '/home/deploy/apps/exchangehub' }}"
            BLUE_PORT="${{ secrets.BLUE_PORT || '5001' }}"
            GREEN_PORT="${{ secrets.GREEN_PORT || '5002' }}"
            NGINX_UPSTREAM_CONF="${{ secrets.NGINX_UPSTREAM_CONF || '/etc/nginx/conf.d/exchangehub-upstream.conf' }}"

            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            cat > .env <<'EOF'
            ${{ secrets.PROD_ENV }}
            EOF

            chmod +x scripts/deploy_blue_green.sh
            APP_NAME="$APP_NAME" \
            APP_DIR="$APP_DIR" \
            BLUE_PORT="$BLUE_PORT" \
            GREEN_PORT="$GREEN_PORT" \
            NGINX_UPSTREAM_CONF="$NGINX_UPSTREAM_CONF" \
            BRANCH="main" \
            scripts/deploy_blue_green.sh
